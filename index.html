<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strava Archive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #fc4c02;
      color: white;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 0.9rem; opacity: 0.85; margin-left: auto; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .stat-card .label { font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; color: #fc4c02; }
    .stat-card .unit { font-size: 0.85rem; color: #555; }

    .section {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
    }
    .section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #444; }

    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 700px) { .chart-row { grid-template-columns: 1fr; } }

    canvas { max-height: 260px; }

    .sport-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .sport-table th { text-align: left; padding: 0.5rem 0.75rem; background: #f9f9f9; color: #555; font-weight: 600; border-bottom: 1px solid #eee; }
    .sport-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
    .sport-table tr:last-child td { border-bottom: none; }

    .activity-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .activity-table th { text-align: left; padding: 0.5rem 0.75rem; background: #f9f9f9; color: #555; font-weight: 600; border-bottom: 2px solid #eee; white-space: nowrap; }
    .activity-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f5f5f5; }
    .activity-table tr:hover td { background: #fef9f7; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #fff0ea;
      color: #fc4c02;
    }

    #loading { text-align: center; padding: 4rem; color: #aaa; font-size: 1.1rem; }
    #error { text-align: center; padding: 4rem; color: #c00; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
  <h1>Strava Archive</h1>
  <span id="last-updated"></span>
</header>

<main>
  <div id="loading">Loading activities...</div>
  <div id="error" style="display:none"></div>
  <div id="dashboard" style="display:none">

    <div class="stats-grid" id="stats-grid"></div>

    <div class="chart-row">
      <div class="section">
        <h2>Monthly Distance (km)</h2>
        <canvas id="monthly-chart"></canvas>
      </div>
      <div class="section">
        <h2>Distance by Sport</h2>
        <canvas id="sport-chart"></canvas>
      </div>
    </div>

    <div class="section">
      <h2>By Sport Type</h2>
      <table class="sport-table" id="sport-table">
        <thead><tr><th>Sport</th><th>Activities</th><th>Total Distance (km)</th><th>Total Elevation (m)</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>All Activities</h2>
      <table class="activity-table" id="activity-table">
        <thead><tr><th>Date</th><th>Name</th><th>Sport</th><th>Distance (km)</th><th>Moving Time</th><th>Elevation (m)</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

  </div>
</main>

<script>
  function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m ${s}s`;
  }

  function buildStats(activities) {
    const total = activities.length;
    const totalKm = activities.reduce((s, a) => s + a.distance_km, 0);
    const totalElev = activities.reduce((s, a) => s + a.elevation_gain_m, 0);
    const totalTime = activities.reduce((s, a) => s + a.moving_time_sec, 0);

    const statsGrid = document.getElementById("stats-grid");
    const stats = [
      { label: "Total Activities", value: total, unit: "" },
      { label: "Total Distance", value: totalKm.toFixed(1), unit: "km" },
      { label: "Total Elevation", value: Math.round(totalElev).toLocaleString(), unit: "m" },
      { label: "Total Time", value: formatTime(totalTime), unit: "" },
    ];

    statsGrid.innerHTML = stats.map(s => `
      <div class="stat-card">
        <div class="label">${s.label}</div>
        <div class="value">${s.value}</div>
        <div class="unit">${s.unit}</div>
      </div>
    `).join("");
  }

  function buildSportTable(activities) {
    const sports = {};
    for (const a of activities) {
      if (!sports[a.sport_type]) sports[a.sport_type] = { count: 0, km: 0, elev: 0 };
      sports[a.sport_type].count++;
      sports[a.sport_type].km += a.distance_km;
      sports[a.sport_type].elev += a.elevation_gain_m;
    }

    const tbody = document.querySelector("#sport-table tbody");
    tbody.innerHTML = Object.entries(sports)
      .sort((a, b) => b[1].km - a[1].km)
      .map(([sport, d]) => `
        <tr>
          <td><span class="badge">${sport}</span></td>
          <td>${d.count}</td>
          <td>${d.km.toFixed(1)}</td>
          <td>${Math.round(d.elev).toLocaleString()}</td>
        </tr>
      `).join("");

    return sports;
  }

  function buildActivityTable(activities) {
    const sorted = [...activities].sort((a, b) => b.date.localeCompare(a.date));
    const tbody = document.querySelector("#activity-table tbody");
    tbody.innerHTML = sorted.map(a => `
      <tr>
        <td>${a.date}</td>
        <td>${a.name}</td>
        <td><span class="badge">${a.sport_type}</span></td>
        <td>${a.distance_km.toFixed(2)}</td>
        <td>${formatTime(a.moving_time_sec)}</td>
        <td>${a.elevation_gain_m.toFixed(0)}</td>
      </tr>
    `).join("");
  }

  function buildCharts(activities, sports) {
    // Monthly distance chart
    const monthly = {};
    for (const a of activities) {
      const month = a.date.slice(0, 7); // YYYY-MM
      monthly[month] = (monthly[month] || 0) + a.distance_km;
    }
    const months = Object.keys(monthly).sort().slice(-12);
    new Chart(document.getElementById("monthly-chart"), {
      type: "bar",
      data: {
        labels: months,
        datasets: [{
          label: "km",
          data: months.map(m => +monthly[m].toFixed(1)),
          backgroundColor: "#fc4c02cc",
          borderRadius: 4,
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    // Sport pie chart
    const sportNames = Object.keys(sports);
    const colors = ["#fc4c02","#ff7340","#ffaa80","#ffd4b8","#e03900","#c42d00","#a82200"];
    new Chart(document.getElementById("sport-chart"), {
      type: "doughnut",
      data: {
        labels: sportNames,
        datasets: [{
          data: sportNames.map(s => +sports[s].km.toFixed(1)),
          backgroundColor: sportNames.map((_, i) => colors[i % colors.length]),
        }]
      },
      options: { plugins: { legend: { position: "bottom" } } }
    });
  }

  async function init() {
    try {
      const resp = await fetch("./activities.yaml");
      if (!resp.ok) throw new Error(`Could not load activities.yaml (${resp.status})`);
      const text = await resp.text();
      const data = jsyaml.load(text) || {};

      // Flatten to array with date attached
      const activities = [];
      for (const [date, entries] of Object.entries(data)) {
        for (const entry of entries) {
          activities.push({ ...entry, date });
        }
      }

      if (activities.length === 0) {
        document.getElementById("loading").textContent = "No activities found in archive yet.";
        return;
      }

      const lastDate = Object.keys(data).sort().pop();
      document.getElementById("last-updated").textContent = `Last synced: ${lastDate}`;

      buildStats(activities);
      const sports = buildSportTable(activities);
      buildActivityTable(activities);
      buildCharts(activities, sports);

      document.getElementById("loading").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    } catch (err) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent = `Error: ${err.message}`;
    }
  }

  init();
</script>
</body>
</html>
